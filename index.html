<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Khushboo</title>

    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #fbc7d1, #c7b9ff, #b4e0ff);
            background-size: 400% 400%;
            animation: gradientFlow 10s ease infinite;
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            text-align: center;
        }

        .birthday-image {
            width: 180px;
            height: 180px;
            object-fit: cover;
            border-radius: 50%;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(255, 100, 150, 0.4);
        }

        .card {
            background: rgba(255, 255, 255, 0.3);
            padding: 30px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            max-width: 400px;
        }

        h1 {
            font-family: 'Pacifico', cursive;
            font-size: 40px;
            color: #9b1d5c;
        }

        .name {
            color: #ff4d7d;
        }

        .msg {
            margin: 15px 0;
            font-size: 18px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            background: white;
            cursor: pointer;
            font-weight: bold;
        }

        .wish-box {
            margin-top: 20px;
            display: none;
        }

        .show {
            display: block;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- ✅ IMPORTANT: put your image in same folder -->
    <img src="khushboo.jpg" class="birthday-image" alt="Khushboo">

    <div class="card">
        <h1>Happy Birthday <span class="name">Khushboo</span></h1>

        <p class="msg">May your day be filled with happiness 💖</p>

        <button class="btn" onclick="celebrate()">🎉 Celebrate</button>
        <button class="btn" onclick="showWish()">✨ Special Wish</button>

        <div id="wish" class="wish-box">
            🌸 Stay happy always and keep smiling! 💕
        </div>
    </div>

</div>

<script>
function celebrate() {
    confetti({
        particleCount: 150,
        spread: 80,
        origin: { y: 0.6 }
    });
}

function showWish() {
    document.getElementById("wish").classList.toggle("show");
}
</script>

</body>
</html>
